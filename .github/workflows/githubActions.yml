name: Android CI

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # ✅ Run Lint
      - name: Run Lint
        run: ./gradlew lint

      # ✅ Run Unit Tests
      - name: Run Unit Tests
        run: ./gradlew test

      # ✅ Build APK (optional but recommended)
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      # 📊 Upload Reports (VERY IMPORTANT)
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html


      - name: Publish Lint Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: app/build/reports/lint-results-debug.xml